<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MavTrack</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;color:#333}

/* NAVBAR */
.navbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px 20px;
 position:fixed;
 width:100%;
 background:rgba(0,0,0,0.7);
 z-index:1000;
}
.navbar img{width:100px}
.nav-menu{display:flex;gap:20px}
.nav-menu a{color:#fff;text-decoration:none;font-size:14px}

/* BOTÃO */
.btn{
 padding:12px 20px;
 border-radius:8px;
 color:white;
 text-decoration:none;
 font-weight:bold;
 display:inline-block;
 transition:.3s;
}
.btn-primary{background:#1e73be}
.btn-primary:hover{transform:scale(1.05)}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 color:white;
 padding:20px;
 background:
 linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
 url('src/img/hero.png') center/cover no-repeat;
}
.hero h1{font-size:36px}
.hero p{margin:15px 0;font-size:16px}

/* BENEFITS */
.benefits{
 padding:40px 20px;
 display:flex;
 gap:15px;
 flex-wrap:wrap;
 justify-content:center;
}
.card{
 background:white;
 padding:20px;
 width:160px;
 border-radius:10px;
 text-align:center;
 box-shadow:0 4px 10px rgba(0,0,0,.1);
}

/* CTA */
.cta{
 text-align:center;
 padding:60px 20px;
 background:#0b2c5f;
 color:white;
}

/* WHATSAPP */
.whatsapp-float{
 position:fixed;
 bottom:20px;
 right:20px;
}
.whatsapp-float img{width:55px}

/* MOBILE */
@media(max-width:768px){
 .nav-menu{display:none}
 .hero h1{font-size:26px}
 .card{width:140px}
}
</style>

</head>

<body>

<header class="navbar">
 <img src="src/img/logo-sem-fundo.png">
 <nav class="nav-menu">
  <a href="#">Início</a>
  <a href="#">Serviços</a>
  <a href="#">Contato</a>
 </nav>
</header>

<section class="hero">
 <div>
  <h1>Reduza em até 40% os custos da sua frota</h1>
  <p>Rastreamento em tempo real, segurança e controle total</p>
  https://wa.me/5515997428578
 </div>
</section>

<section class="benefits">
 <div class="card">📍 Rastreamento</div>
 <div class="card">🚨 Alertas</div>
 <div class="card">📊 Controle</div>
 <div class="card">🔒 Segurança</div>
</section>

<section class="cta">
 <h2>Fale agora e proteja sua frota</h2>
 <br>
 <a href="https://wa.me/5515997428578" class="btn btn-primary">Chamar no WhatsApp</a>
</section>

<a href="https://wa.me/5515997428578" class="whatsapp-float">
 <img src="src/img/icone-whatsapp.png">
</a>

</body>
</html>
